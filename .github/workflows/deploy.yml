name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to target VM
    runs-on: self-hosted
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo systemctl stop mywebapp || true && \
             sudo docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }} && \
             sudo systemctl start mywebapp"

      - name: Verify deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "bash ~/verify.sh"